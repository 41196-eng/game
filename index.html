<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web AR Education Game</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#1e293b;
        font-family:Arial, sans-serif;
        color:white;
    }

    #container{
        position:relative;
        width:100vw;
        height:100vh;
    }

    video, canvas{
        position:absolute;
        width:100%;
        height:100%;
        object-fit:cover;
    }

    /* กลับด้านวิดีโอให้เหมือนกระจก จะได้ควบคุมมือได้เป็นธรรมชาติ */
    video{
        transform:scaleX(-1);
    }

    #ui{
        position:absolute;
        top:20px;
        left:20px;
        z-index:10;
        background:rgba(0,0,0,0.5);
        padding:15px;
        border-radius:15px;
    }

    #score{
        font-size:24px;
        margin-bottom:10px;
    }

    .item{
        position:absolute;
        width:80px;
        height:80px;
        background:#38bdf8;
        border-radius:50%;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:30px;
        color:white;
    }

    #handCursor{
        position:absolute;
        width:40px;
        height:40px;
        border:3px solid yellow;
        border-radius:50%;
        z-index:20;
        pointer-events:none;
        display:none;
    }

    #errorBox{
        position:absolute;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        background:rgba(220,38,38,0.95);
        padding:20px 30px;
        border-radius:12px;
        max-width:80%;
        text-align:center;
        display:none;
        z-index:30;
    }
</style>
</head>
<body>

<div id="container">

    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="ui">
        <div id="score">คะแนน : 0</div>
        <div>แตะวงกลมด้วยมือเพื่อเก็บคะแนน</div>
    </div>

    <div id="handCursor"></div>

    <div id="errorBox">
        ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้องแล้วโหลดหน้านี้ใหม่
    </div>

</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cursor = document.getElementById("handCursor");
const scoreText = document.getElementById("score");
const errorBox = document.getElementById("errorBox");

let score = 0;

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// ======================
// สร้างไอเทม
// ======================

function createItem(){

    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = "⭐";

    item.style.left =
        Math.random()*(window.innerWidth-100)+"px";

    item.style.top =
        Math.random()*(window.innerHeight-100)+"px";

    document.getElementById("container")
        .appendChild(item);

    return item;
}

let currentItem = createItem();


// ======================
// แปลงพิกัด landmark (0-1 เทียบกับเฟรมวิดีโอจริง)
// ให้เป็นพิกัดบนหน้าจอ โดยคำนึงถึง object-fit:cover
// และการกลับด้าน (mirror) ของวิดีโอ
// ======================

function landmarkToScreen(normX, normY){

    const containerW = window.innerWidth;
    const containerH = window.innerHeight;

    const videoW = video.videoWidth || containerW;
    const videoH = video.videoHeight || containerH;

    const containerRatio = containerW/containerH;
    const videoRatio = videoW/videoH;

    let scale, offsetX = 0, offsetY = 0;

    if(containerRatio > videoRatio){
        // เต็มความกว้าง ครอปบน-ล่าง
        scale = containerW/videoW;
        offsetY = (videoH*scale - containerH)/2;
    } else {
        // เต็มความสูง ครอปซ้าย-ขวา
        scale = containerH/videoH;
        offsetX = (videoW*scale - containerW)/2;
    }

    let x = normX*videoW*scale - offsetX;
    const y = normY*videoH*scale - offsetY;

    // กลับด้านตามการ mirror ของวิดีโอ (scaleX(-1))
    x = containerW - x;

    return {x, y};
}


// ======================
// MediaPipe Hands
// ======================

const hands = new Hands({
    locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results=>{

    ctx.clearRect(0,0,
        canvas.width,
        canvas.height);

    if(results.multiHandLandmarks && results.multiHandLandmarks.length>0){

        const hand =
            results.multiHandLandmarks[0];

        // ปลายนิ้วชี้
        const finger = hand[8];

        const pos = landmarkToScreen(finger.x, finger.y);

        cursor.style.display = "block";
        cursor.style.left = (pos.x-20)+"px";
        cursor.style.top = (pos.y-20)+"px";

        checkCollision(pos.x, pos.y);

    } else {
        cursor.style.display = "none";
    }
});


// ======================
// ตรวจชน
// ======================

function checkCollision(x,y){

    if(!currentItem) return;

    const rect =
        currentItem.getBoundingClientRect();

    if(
        x>rect.left &&
        x<rect.right &&
        y>rect.top &&
        y<rect.bottom
    ){

        score += 10;

        scoreText.innerHTML =
            "คะแนน : "+score;

        currentItem.remove();

        currentItem = createItem();
    }
}


// ======================
// เปิดกล้อง
// ======================

const camera = new Camera(video,{
    onFrame: async ()=>{
        await hands.send({image:video});
    },
    width:1280,
    height:720
});

camera.start().catch(err=>{
    console.error("ไม่สามารถเปิดกล้องได้:", err);
    errorBox.style.display = "block";
});

</script>

</body>
</html>
